########## PERFORMANCE (Intel iGPU) ##########
vo=gpu
gpu-api=opengl
gpu-context=wayland
hwdec=auto-safe        # Massive performance boost (GPU decoding)

########## PLAYBACK BEHAVIOR ##########
save-position-on-quit=yes   # Auto resume next time
keep-open=yes               # Stay open when video ends
pause=no                    # Start playing immediately
loop-file=no

########## VIDEO BEHAVIOR ##########
video-unscaled=no          # Do NOT resize video
autofit-larger=0            # Never auto-scale
cursor-autohide=1000

########## AUDIO ##########
volume=100                  # Uses system volume
audio-channels=stereo

########## SUBTITLES ##########
no-sub                      # Subtitles OFF by default
sub-font-size=36
sub-border-size=2

########## SCREENSHOTS ##########
screenshot-directory=/home/senal/Pictures/mpv_screenshots/
screenshot-format=png
screenshot-template="%F_%p"
