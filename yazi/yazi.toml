[manager]
ratio = [1, 2, 3]
mouse_events = [ "click", "scroll", "touch", "drag" ]

[opener]
edit = [
  { run = 'setsid kwrite "$@" &', block = false, desc = "KWrite" },
  { run = 'setsid code "$@" &',   block = false, desc = "VS Code" },
  { run = 'setsid nvim "$@"', block = true, desc = "Neovim" },
]
open = [
  { run = 'setsid xdg-open "$@" &', block = false },
]
image = [
  { run = 'setsid gthumb "$@"', block = false, desc = "gThumb" },
]
libreoffice = [
  { run = 'setsid libreoffice "$@" &', block = false, desc = "LibreOffice" },
]
music = [
  { run = 'setsid kitty -e termusic "$@"', block = false, desc = "Termusic" },
  { run = 'mpv "$@"', orphan = true, desc = "mpv" },
]
video = [
  { run = 'mpv "$@"', orphan = true, desc = "mpv" },
]
[open]
prepend_rules = [
  # Images (including WebP)
  { mime = "image/*", use = "image" },
  { name = "*.webp",  use = "image" },
  
  # Text/Code
  { mime = "text/*", use = "edit" },
  
  #Audio
  { mime = "audio/*", use = "music" },

  #Video
  { mime = "video/*", use = "video" },

  # Office Documents
  { mime = "application/vnd.openxmlformats-officedocument.wordprocessingml.document", use = "libreoffice" },
  { mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", use = "libreoffice" },
  { mime = "application/vnd.openxmlformats-officedocument.presentationml.presentation", use = "libreoffice" },
  { mime = "application/msword", use = "libreoffice" },
  { mime = "application/vnd.ms-excel", use = "libreoffice" },
  { mime = "application/vnd.ms-powerpoint", use = "libreoffice" },
  
  # Fallback
  { name = "*", use = "open" }
]
